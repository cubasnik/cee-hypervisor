version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cee-postgres
    environment:
      POSTGRES_DB: cee
      POSTGRES_USER: cee
      POSTGRES_PASSWORD: cee123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cee-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: cee-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cee:cee123@postgres:5432/cee
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      LIBVIRT_URI: qemu:///system
      IMAGES_PATH: /var/lib/libvirt/images
    volumes:
      - /var/run/libvirt/libvirt-sock:/var/run/libvirt/libvirt-sock
      - /var/lib/libvirt/images:/var/lib/libvirt/images
      - ./backend:/app
    depends_on:
      - postgres
    networks:
      - cee-network
    privileged: true
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cee-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000
    depends_on:
      - backend
    networks:
      - cee-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: cee-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ericssonsoft.ru
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - cee-network
    restart: unless-stopped

networks:
  cee-network:
    driver: bridge

volumes:
  postgres_data:
